<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サンプラー用のアナウンス文生成ツール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f5f4f0; color: #1a1a1a; padding: 2rem; }
  .container { max-width: 640px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 2rem; border: 1px solid #e0deda; }
  h1 { font-size: 17px; font-weight: 500; margin-bottom: 1.5rem; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  label { font-size: 12px; color: #888; }
  input, select, textarea { font-family: inherit; font-size: 14px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; color: #1a1a1a; width: 100%; }
  input[type=password] { font-family: monospace; }
  textarea { resize: vertical; line-height: 1.7; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  button { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 11px 20px; font-size: 14px; cursor: pointer; font-family: inherit; width: 100%; margin-top: 6px; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  #status { font-size: 13px; color: #666; margin-top: 12px; line-height: 1.7; min-height: 20px; white-space: pre-wrap; }
  audio { width: 100%; margin-top: 12px; display: none; }
  .note { font-size: 12px; color: #aaa; margin-top: 10px; }
</style>
</head>
<body>
<div class="container">
  <h1>🥁 サンプラー用のアナウンス文生成ツール</h1>

  <div class="field">
    <label>Gemini API キー</label>
    <input type="password" id="apikey" placeholder="AIza..."/>
  </div>

  <div class="field">
    <label>モデル</label>
    <select id="model">
<option value="gemini-2.5-flash" selected>gemini-2.5-flash</option>
<option value="gemini-2.0-flash-exp">gemini-2.0-flash-exp</option>
<option value="gemini-1.5-pro">gemini-1.5-pro</option>
    </select>
  </div>

  <div class="grid2">
    <div class="field">
      <label>日本語ボイス</label>
      <select id="voiceJP">
        <option value="Puck" selected>Puck（知的）</option>
        <option value="Charon">Charon（重厚）</option>
        <option value="Kore">Kore（落ち着き）</option>
        <option value="Aoede">Aoede（明るい）</option>
        <option value="Fenrir">Fenrir（力強い）</option>
      </select>
    </div>
    <div class="field">
      <label>英語ボイス</label>
      <select id="voiceEN">
        <option value="Puck" selected>Puck</option>
        <option value="Charon">Charon</option>
        <option value="Kore">Kore</option>
        <option value="Aoede">Aoede</option>
        <option value="Fenrir">Fenrir</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label>日本語テキスト</label>
    <textarea id="textJP" rows="3">まもなく、八丈島の郷土芸能・八丈太鼓の演奏が始まります。
このあと、どなたでもご参加いただける体験コーナーもございます。
どうぞお気軽にお立ち寄りください。</textarea>
  </div>

  <div class="field">
    <label>英語テキスト</label>
    <textarea id="textEN" rows="3">A live Hachijo Taiko performance will begin shortly.
A taiko experience session is also open to everyone.
Please feel free to join us.</textarea>
  </div>

  <div class="field">
    <label>スタイル指示（英語）</label>
    <textarea id="style" rows="2">Speak in a calm, warm, and welcoming tone. Use gentle pacing with natural pauses. Suitable for a cultural outdoor event announcement.</textarea>
  </div>

  <div class="grid2">
    <div class="field">
      <label>JP後の無音（秒）</label>
      <input type="number" id="silJP" value="2" min="0" max="10" step="0.5"/>
    </div>
    <div class="field">
      <label>EN後の無音（秒）</label>
      <input type="number" id="silEN" value="3" min="0" max="10" step="0.5"/>
    </div>
  </div>

  <button id="genBtn" onclick="generate()">ループWAVを生成してダウンロード</button>
  <div id="status"></div>
  <audio id="player" controls></audio>
  <p class="note">※ このファイルをブラウザで直接開いて使用してください</p>
</div>

<script>
const GEMINI_SAMPLE_RATE = 24000; 
const OUTPUT_SAMPLE_RATE = 44100;

function wrapRawPcmToWav(pcmBuffer, sampleRate) {
  const buffer = new ArrayBuffer(44 + pcmBuffer.byteLength);
  const view = new DataView(buffer);
  
  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + pcmBuffer.byteLength, true);
  writeString(view, 8, 'WAVE');
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true); 
  view.setUint16(22, 1, true); 
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true); 
  view.setUint16(32, 2, true); 
  view.setUint16(34, 16, true); 
  writeString(view, 36, 'data');
  view.setUint32(40, pcmBuffer.byteLength, true);
  
  const pcmView = new Uint8Array(pcmBuffer);
  const wavView = new Uint8Array(buffer, 44);
  wavView.set(pcmView);
  
  return buffer;
}

function createWavFile(audioBuffer) {
  const numChannels = 1; 
  const sampleRate = OUTPUT_SAMPLE_RATE;
  const format = 1; 
  const bitDepth = 16;
  
  const resultData = audioBuffer.getChannelData(0);
  const buffer = new ArrayBuffer(44 + resultData.length * 2);
  const view = new DataView(buffer);
  
  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + resultData.length * 2, true);
  writeString(view, 8, 'WAVE');
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, format, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true);
  view.setUint16(32, numChannels * (bitDepth / 8), true);
  view.setUint16(34, bitDepth, true);
  writeString(view, 36, 'data');
  view.setUint32(40, resultData.length * 2, true);
  
  let offset = 44;
  for (let i = 0; i < resultData.length; i++, offset += 2) {
    let s = Math.max(-1, Math.min(1, resultData[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  
  return buffer;
}

function writeString(view, offset, string) {
  for (let i = 0; i < string.length; i++) {
    view.setUint8(offset + i, string.charCodeAt(i));
  }
}

async function fetchTTS(apiKey, model, text, voice, style) {
  const fullText = style ? style + "\n\n" + text : text;
  const body = {
    contents: [{ parts: [{ text: fullText }] }],
    generationConfig: {
      responseModalities: ["AUDIO"],
      speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } }
    }
  };

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
    { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }
  );
  const data = await res.json();
  if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
  const b64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
  if (!b64) throw new Error("音声データが返ってきませんでした。指示やキーを確認してください。");
  
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr.buffer;
}

async function generate() {
  const apiKey  = document.getElementById("apikey").value.trim();
  const model   = document.getElementById("model").value;
  const textJP  = document.getElementById("textJP").value.trim();
  const textEN  = document.getElementById("textEN").value.trim();
  const voiceJP = document.getElementById("voiceJP").value;
  const voiceEN = document.getElementById("voiceEN").value;
  const style   = document.getElementById("style").value.trim();
  const silJP   = parseFloat(document.getElementById("silJP").value) || 2;
  const silEN   = parseFloat(document.getElementById("silEN").value) || 3;
  const status  = document.getElementById("status");
  const btn     = document.getElementById("genBtn");
  const player  = document.getElementById("player");

  if (!apiKey) { status.textContent = "APIキーを入力してください"; return; }
  btn.disabled = true;
  status.style.color = "#666";

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: OUTPUT_SAMPLE_RATE });

  try {
    status.textContent = "① 日本語音声を生成中...";
    const rawBufJP = await fetchTTS(apiKey, model, textJP, voiceJP, style);
    const wavBufJP = wrapRawPcmToWav(rawBufJP, GEMINI_SAMPLE_RATE);
    const audioBufJP = await audioCtx.decodeAudioData(wavBufJP);

    status.textContent = "② 英語音声を生成中...";
    const rawBufEN = await fetchTTS(apiKey, model, textEN, voiceEN, style);
    const wavBufEN = wrapRawPcmToWav(rawBufEN, GEMINI_SAMPLE_RATE);
    const audioBufEN = await audioCtx.decodeAudioData(wavBufEN);

    status.textContent = "③ WAVファイルを結合中...";
    
    const samplesJP = audioBufJP.length;
    const samplesEN = audioBufEN.length;
    const samplesSilJP = Math.floor(OUTPUT_SAMPLE_RATE * silJP);
    const samplesSilEN = Math.floor(OUTPUT_SAMPLE_RATE * silEN);
    const totalSamples = samplesJP + samplesSilJP + samplesEN + samplesSilEN;
    
    const finalBuffer = audioCtx.createBuffer(1, totalSamples, OUTPUT_SAMPLE_RATE);
    const finalData = finalBuffer.getChannelData(0);
    
    finalData.set(audioBufJP.getChannelData(0), 0);
    finalData.set(audioBufEN.getChannelData(0), samplesJP + samplesSilJP);
    
    const wavBuffer = createWavFile(finalBuffer);

    const blob = new Blob([wavBuffer], { type: "audio/wav" });
    const url  = URL.createObjectURL(blob);
    player.src = url;
    player.style.display = "block";
    player.play();

    const a = document.createElement("a");
    a.href = url;
    a.download = `announcement_${voiceJP}.wav`;
    a.click();

    const durJP = audioBufJP.duration.toFixed(1);
    const durEN = audioBufEN.duration.toFixed(1);
    const total = finalBuffer.duration.toFixed(1);
    status.style.color = "#2a7a4b";
    status.textContent = `完成！\nJP ${durJP}秒 ＋ 無音${silJP}秒 ＋ EN ${durEN}秒 ＋ 無音${silEN}秒 ＝ 合計 ${total}秒のWAVを出力しました。`;
  } catch(e) {
    status.style.color = "#c0392b";
    status.textContent = `エラー: ${e.message}`;
    console.error(e);
  } finally {
    audioCtx.close();
    btn.disabled = false;
  }
}
</script>
</body>
</html>
