<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gemini TTS ループWAV生成ツール</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; line-height: 1.6; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input[type="text"], textarea, select { width: 100%; padding: 8px; box-sizing: border-box; }
        textarea { height: 100px; }
        .row { display: flex; gap: 10px; margin-top: 10px; }
        .col { flex: 1; }
        button { margin-top: 20px; padding: 12px 24px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; font-weight: bold; color: #d9534f; }
        audio { margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

    <h2>Gemini TTS ループWAV生成ツール</h2>
    
    <label for="apiKey">Gemini API Key:</label>
    <input type="text" id="apiKey" placeholder="AIzaSy...">

    <label for="modelSelect">使用モデル:</label>
    <select id="modelSelect">
        <option value="gemini-2.0-flash">gemini-2.0-flash (推奨・高速)</option>
        <option value="gemini-2.0-pro">gemini-2.0-pro (高品質)</option>
    </select>

    <div class="row">
        <div class="col">
            <label for="textJP">日本語テキスト (JP):</label>
            <textarea id="textJP">本日は「たたいてみよう八丈太鼓」にご参加いただき、誠にありがとうございます。皆様からいただくご感想やご意見は、今後のワークショップやイベントをより良いものにしていくための大切な参考となります。お手元のアンケートへのご協力をお願いいたします。ご記入いただいたアンケートは、受付までお渡しください。また、ニュースレターでは最新情報をお届けしています。ご興味のある方はぜひご登録ください。本日は誠にありがとうございました。</textarea>
            <label for="silenceJP">後ろに挟む無音 (秒):</label>
            <input type="number" id="silenceJP" value="2" min="0">
        </div>
        <div class="col">
            <label for="textEN">英語テキスト (EN):</label>
            <textarea id="textEN">Thank you very much for joining “Let’s Play Hachijo Taiko” today. Your feedback is very important to us. We would appreciate it if you could take a moment to complete the questionnaire and return it to the reception desk. Thank you again for joining us today.</textarea>
            <label for="silenceEN">後ろに挟む無音 (秒):</label>
            <input type="number" id="silenceEN" value="3" min="0">
        </div>
    </div>

    <label for="voiceName">音声モデルの声種 (Voice Name):</label>
    <select id="voiceName">
        <option value="Puck">Puck (標準的な声)</option>
        <option value="Charon">Charon</option>
        <option value="Kore">Kore</option>
        <option value="Fenrir">Fenrir</option>
        <option value="Aoede">Aoede</option>
    </select>

    <button id="generateBtn">WAVファイルを生成する</button>
    
    <div id="status"></div>
    <audio id="audioPreview" controls></audio>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('modelSelect').value;
            const textJP = document.getElementById('textJP').value.trim();
            const silenceJP = parseFloat(document.getElementById('silenceJP').value) || 0;
            const textEN = document.getElementById('textEN').value.trim();
            const silenceEN = parseFloat(document.getElementById('silenceEN').value) || 0;
            const voiceName = document.getElementById('voiceName').value;
            
            const statusDiv = document.getElementById('status');
            const generateBtn = document.getElementById('generateBtn');
            
            if (!apiKey) {
                statusDiv.innerText = "エラー: APIキーを入力してください。";
                return;
            }
            
            statusDiv.innerText = "音声生成中...";
            generateBtn.disabled = true;
            
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
                
                // 1. 日本語音声の取得とデコード
                statusDiv.innerText = "日本語音声を生成中...";
                const bufferJP = await fetchGeminiTTS(apiKey, model, textJP, voiceName);
                const audioBufferJP = await audioCtx.decodeAudioData(bufferJP);
                
                // 2. 英語音声の取得とデコード
                statusDiv.innerText = "英語音声を生成中...";
                const bufferEN = await fetchGeminiTTS(apiKey, model, textEN, voiceName);
                const audioBufferEN = await audioCtx.decodeAudioData(bufferEN);
                
                // 3. 結合処理 (JP + 無音 + EN + 無音)
                statusDiv.innerText = "音声データを結合中...";
                const sampleRate = 44100;
                const totalDuration = audioBufferJP.duration + silenceJP + audioBufferEN.duration + silenceEN;
                const totalSamples = Math.floor(totalDuration * sampleRate);
                
                const finalBuffer = audioCtx.createBuffer(1, totalSamples, sampleRate);
                const channelData = finalBuffer.getChannelData(0);
                
                let offset = 0;
                
                // JPコピー
                channelData.set(audioBufferJP.getChannelData(0), offset);
                offset += audioBufferJP.length;
                
                // JP無音スキップ
                offset += Math.floor(silenceJP * sampleRate);
                
                // ENコピー
                channelData.set(audioBufferEN.getChannelData(0), offset);
                offset += audioBufferEN.length;
                
                // 4. WAVバイナリに変換
                const wavBytes = bufferToWav(channelData, sampleRate);
                
                // 5. 出力
                const blob = new Blob([wavBytes], { type: 'audio/wav' });
                const url = URL.createObjectURL(blob);
                
                const audioPreview = document.getElementById('audioPreview');
                audioPreview.src = url;
                
                statusDiv.innerHTML = `成功！ 総再生時間: ${totalDuration.toFixed(1)} 秒 (ループ1周)。<br><a href="${url}" download="hachijo_taiko_announcement.wav" style="color:#007bff; font-weight:bold;">[ここをクリックしてWAVをダウンロード]</a>`;
                
            } catch (error) {
                console.error(error);
                statusDiv.innerText = "エラーが発生しました: " + error.message;
            } finally {
                generateBtn.disabled = false;
            }
        });

        // Gemini APIから音声を叩き出す関数 (最新2.0仕様)
        async function fetchGeminiTTS(apiKey, model, text, voiceName) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: {
                            voiceConfig: {
                                prebuiltVoiceConfig: {
                                    voiceName: voiceName
                                }
                            }
                        }
                    }
                })
            });
            
            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error.message);
            }
            
            // APIから返ってきたbase64音声データを探して取り出す
            const candidate = data.candidates?.[0];
            const part = candidate?.content?.parts?.find(p => p.inlineData || p.fileData);
            
            if (!part || !part.inlineData || !part.inlineData.data) {
                throw new Error("APIから音声データが返されませんでした。モデルか設定を確認してください。");
            }
            
            // base64をArrayBufferに変換
            const binaryString = atob(part.inlineData.data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        // Float32の波形データを標準的な16bit PCMのWAVフォーマットに変換する関数
        function bufferToWav(buffer, sampleRate) {
            const bufferLength = buffer.length;
            const wavBuffer = new ArrayBuffer(44 + bufferLength * 2);
            const view = new DataView(wavBuffer);
            
            /* RIFF identifier */
            writeString(view, 0, 'RIFF');
            /* file length */
            view.setUint32(4, 36 + bufferLength * 2, true);
            /* RIFF type */
            writeString(view, 8, 'WAVE');
            /* format chunk identifier */
            writeString(view, 12, 'fmt ');
            /* format chunk length */
            view.setUint32(16, 16, true);
            /* sample format (raw) */
            view.setUint16(20, 1, true);
            /* channel count */
            view.setUint16(22, 1, true);
            /* sample rate */
            view.setUint32(24, sampleRate, true);
            /* byte rate (sample rate * block align) */
            view.setUint32(28, sampleRate * 2, true);
            /* block align (channel count * bytes per sample) */
            view.setUint16(32, 2, true);
            /* bits per sample */
            view.setUint16(34, 16, true);
            /* data chunk identifier */
            writeString(view, 36, 'data');
            /* data chunk length */
            view.setUint32(40, bufferLength * 2, true);
            
            // 浮動小数を16bit整数に変換して書き込み
            let index = 44;
            for (let i = 0; i < bufferLength; i++) {
                let sample = Math.max(-1, Math.min(1, buffer[i]));
                sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                view.setInt16(index, sample, true);
                index += 2;
            }
            
            return wavBuffer;
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }
    </script>
</body>
</html>
